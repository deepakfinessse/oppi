name: Deploy Oppi Full Stack App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ Debug (Very Important - SEE FILES)
      # - name: Debug Folder Structure
      #   run: ls -R

      # ✅ Checkout Node (React)
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # ✅ Build Frontend
      - name: Build React App
        run: |
          cd innovationui
          npm install
          npm run build

      # ✅ Debug (Very Important - SEE FILES)
      # - name: Debug React Output
      #   run: ls innovationui

      # ✅ Verify React Build Exists
      # - name: Check React Build
      #   run: ls innovationui/dist

      # ✅ Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0

      # ✅ Build Backend
      - name: Publish .NET API
        run: |
          cd OppiInnovationApi
          dotnet restore
          dotnet publish -c Release -o publish

      # ✅ Verify backend publish
      - name: Debug Folders
        run: |
          # ls innovationui
          ls innovationui/dist
          ls OppiInnovationApi/publish

      # ✅ Fix SSH Key
      - name: Fix SSH Key
        run: |
          mkdir -p /home/runner/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > /home/runner/.ssh/id_rsa
          chmod 600 /home/runner/.ssh/id_rsa

      # ✅ Copy react build
      - name: Copy Frontend to VM
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          source: "innovationui/dist/*"
          target: "/home/avian/oppi"
          debug: true

      # ✅ Copy backend publish
      - name: Copy Backend to VM
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          source: "OppiInnovationApi/publish/*"
          target: "/home/avian/oppi"
          debug: true

      # ✅ Deploy on VM
      - name: Run deployment commands
        uses: appleboy/ssh-action@v0.1.4
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          # port: 22
          script: |
            # Move frontend to nginx
            sudo rm -rf /var/www/oppi
            sudo mkdir -p /var/www/oppi
            sudo cp -r /home/avian/oppi/innovationui/dist/* /var/www/oppi/
           
            # Move backend
            sudo rm -rf /home/avian/oppi/backend
            sudo mkdir -p /home/avian/oppi/backend
            sudo cp -r /home/avian/oppi/OppiInnovationApi/publish/* /home/avian/oppi/backend/

            # Restart Backend
            sudo systemctl restart oppi-api

            # Restart nginx
            sudo systemctl restart nginx
