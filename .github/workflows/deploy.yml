name: Deploy Oppi Full Stack App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ Checkout Node (React)
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # ✅ Build Frontend
      - name: Build React App
        run: |
          cd innovationui
          npm install
          npm run build

      # ✅ Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0

      # ✅ Build Backend
      - name: Publish .NET API
        run: |
          cd OppiInnovationApi
          dotnet restore
          dotnet publish -c Release -o publish

      # ✅ Verify builds exist
      - name: Debug Folders
        run: |
          ls innovationui/dist
          ls OppiInnovationApi/publish

      # ✅ Add VM to known_hosts (on runner host, for reference only)
      - name: Add VM to known_hosts
        run: |
          mkdir -p /home/runner/.ssh
          ssh-keyscan -H ${{ secrets.AZURE_VM_HOST }} >> /home/runner/.ssh/known_hosts

      # ✅ Copy react build
      # NOTE: scp-action runs in Docker — it cannot access /home/runner/.ssh
      # Must use key: (raw secret value), NOT key_path:
      - name: Copy Frontend to VM
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          source: "innovationui/dist/*"
          target: "/home/avian/oppi"
          strip_components: 2   # strips "innovationui/dist/" prefix on remote

      # ✅ Copy backend publish
      - name: Copy Backend to VM
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          source: "OppiInnovationApi/publish/*"
          target: "/home/avian/oppi/backend"
          strip_components: 2   # strips "OppiInnovationApi/publish/" prefix on remote

      # ✅ Deploy on VM
      - name: Run deployment commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            # Move frontend to nginx
            sudo rm -rf /var/www/oppi
            sudo mkdir -p /var/www/oppi
            sudo cp -r /home/avian/oppi/* /var/www/oppi/

            # Restart Backend
            sudo systemctl restart oppi-api

            # Restart nginx
            sudo systemctl restart nginx